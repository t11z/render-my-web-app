name: Weekly Security Agent (OWASP Top 10)

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays, 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write # create a fix branch
  issues: write # open the findings issue
  pull-requests: write # open the fix PR
  id-token: write # OIDC token for claude-code-action authentication

concurrency:
  group: security-agent
  cancel-in-progress: false

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Claude security review (OWASP Top 10)
        uses: anthropics/claude-code-action@20c8abf165d5f85ab3fc970db9498436377dc9d1 # v1.0.128
        env:
          # Authenticates the `gh` CLI the agent uses to file the issue / fix PR.
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Instructions live in .claude/commands/security-review.md (versioned,
          # also runnable locally via `claude` then `/security-review`).
          prompt: '/security-review'
          claude_args: |
            --model claude-opus-4-7
            --max-turns 120
            --allowedTools "Bash,Read,Edit,Write,Grep,Glob,WebFetch,WebSearch"
