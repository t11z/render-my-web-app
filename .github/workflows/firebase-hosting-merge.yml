name: Deploy to Firebase Hosting on merge

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      # action-hosting-deploy still ships a Node 20 runtime; force it onto Node 24.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_GA_ID: ${{ vars.VITE_GA_ID }}
          VITE_KOFI_HANDLE: ${{ vars.VITE_KOFI_HANDLE }}
      # Deploy only once Firebase is configured; otherwise skip so CI stays green.
      - name: Deploy to Firebase live channel
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT != '' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: render-my
          channelId: live
